<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatty</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button
      class="logout-button"
      type="button"
      onclick="window.location.href = 'login.html'"
    >
      Logout
    </button>

    <div class="sidebar">
      <div class="sidebar-header">
        <span>Sermo</span>
        <button
          class="add-chat-main-button"
          type="button"
          onclick="openAddFriendsMenu()"
        >
          +
        </button>
      </div>

      <div class="list-container">
        <div class="section-title">Gruppen</div>
        <div id="gruppen-liste"></div>

        <div class="section-title">Direktnachrichten</div>
        <div id="dm-list"></div>
      </div>
    </div>

    <div id="alert" class="alert-box" onclick="closeAlert()">
      <span id="alert-text"
        >Server not reachable. Please try it later Again.</span
      >
    </div>

    <div class="main-chat">
      <div class="chat-header">
        <span id="current-chat-name">Testgruppe</span>
      </div>

      <div class="messages-container"></div>

      <div class="input-container">
        <div class="input-box">
          <input type="text" placeholder="Nachricht schreiben..." />
        </div>
        <button class="action-button" type="button">Senden</button>
      </div>
    </div>

    <div class="modal-overlay modal-hidden" id="add-chat-modal">
      <div class="modal-box">
        <h3>Neuen Chat starten</h3>
        <p>
          Gib einen Namen für eine DM ein, oder mehrere Namen mit Komma getrennt
          für eine Gruppe.
        </p>
        <input
          type="text"
          id="friends-username-input"
          placeholder="Name(n) eingeben..."
        />
        <div class="modal-buttons">
          <button
            class="modal-btn cancel-btn"
            type="button"
            onclick="closeAddFriendsMenu()"
          >
            Abbrechen
          </button>
          <button
            class="modal-btn confirm-btn"
            type="button"
            onclick="confirmAddFriends()"
          >
            Erstellen
          </button>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>

<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatty</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button
      class="logout-button"
      type="button"
      onclick="window.location.href = 'login.html'"
    >
      Logout
    </button>

    <div class="sidebar">
      <div class="sidebar-header">Sermo</div>
      <div class="list-container">
        <div class="section-title">Gruppen</div>
        <div id="gruppen-liste"></div>

        <div class="section-title">Direktnachrichten</div>
        <div id="dm-list"></div>
      </div>
    </div>

    <div id="alert" class="alert-box" onclick="closeAlert()">
      <span id="alert-text"
        >Server not reachable. Please try it later Again.</span
      >
    </div>

    <div class="main-chat">
      <div class="chat-header">
        <span id="current-chat-name">Testgruppe</span>
      </div>

      <div class="messages-container"></div>

      <div class="input-container">
        <div class="input-box">
          <input type="text" placeholder="Nachricht schreiben..." />
        </div>
        <button class="action-button" type="button">Senden</button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
